name: daily-fetch

on:
  schedule:
    # Every 15 minutes — near-real-time polling. ~96 runs/day, vast majority
    # no-op in <5 sec (fetch CHANGELOG.md, diff, exit). Catches new Anthropic
    # releases within ~15 min of publish. Well within free-tier GHA budget.
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      force_baseline:
        description: 'Override last-seen-version.txt (e.g. "2.1.118" to backfill from there). Leave empty for normal run.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: daily-fetch
  cancel-in-progress: false

jobs:
  fetch-and-process:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout cc-watcher
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CCWATCHER_PUSH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund

      - name: Fetch and process changelog
        id: process
        env:
          SUBSCRIBER_PAT_TCG_PORTAL: ${{ secrets.SUBSCRIBER_PAT_TCG_PORTAL }}
          FORCE_BASELINE: ${{ inputs.force_baseline }}
        run: node scripts/fetch-and-process.mjs

      - name: Commit cc-watcher state updates
        run: |
          git config user.name 'cc-watcher-bot'
          git config user.email 'cc-watcher-bot@users.noreply.github.com'
          if ! git diff --quiet -- state/; then
            git add state/
            git commit -m "chore(state): daily fetch ${{ steps.process.outputs.run_summary }}"
            git push
          else
            echo "No state changes to commit."
          fi
